<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Demo Integración Continua</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 80px; }
        button { padding: 15px 30px; font-size: 18px; border: none; border-radius: 5px; cursor: pointer; color: white; transition: 0.3s; }
        
        /* Clases de colores para la demo */
        .blue { background-color: #007BFF; }
        .green { background-color: #28A745; }
        
        #mensaje { margin-top: 20px; font-size: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <h1>Demo de Despliegue Automatizado</h1>
    
    <button id="btn-accion" class="green">Soy un botón Azul</button>
    
    <p id="mensaje"></p>

    <script src="app.js"></script>
</body>
</html>
